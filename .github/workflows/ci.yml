name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev extras only — CPU/numpy PoC, no torch)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Import smoke test
        run: python -c "import atanor_core; print(atanor_core.__version__)"
      - name: Run tests
        run: pytest -q
